<html lang="en"><head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>CiphAnon Studios</title>
      <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-image: url('../assets/LoadingUpd.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #333;
            color: white;
            font-family: Inter, Arial, sans-serif;
        }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
        }
        .topbar {
            padding: 12px 20px;
            background: black;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: orange;
        }
        .topbar button {
            padding: 6px 14px;
            border: 2px solid orange;
            border-radius: 100px;
            background: #071018;
            color: #ff9f1c;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.15s;
        }
        .topbar button:hover {
            transform: translateY(-2px);
            background: #333;
        }
      </style>
    </head>
    <body>
      <div class="topbar">
        <!-- The left-most button is now the reload button -->
        <button onclick="document.getElementById('content-iframe').src = document.getElementById('content-iframe').src;">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#F19E39"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 128 29.5T715-690v-110h80v280H515v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t90-116h87q-29 106-114 173t-212 67Z"></path></svg>
        </button>
        <span>CiphAnon Studios</span>
        <!-- The right-most button remains the close button -->
        <button onclick="window.close()">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#F19E39"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"></path></svg>
        </button>
      </div>
      <iframe id="content-iframe" src="https://petezahbare.adidasnmdcitysock.com.cdn.cloudflare.net/"></iframe>
    
    
  </body></html>
