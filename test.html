<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable Bookmark Button</title>
    <style>
        .draggable {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            cursor: grab;
        }
        .draggable:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <a id="bookmark" class="draggable" href="javascript:void(0);" draggable="true">Drag to Bookmark</a>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const bookmark = document.getElementById("bookmark");

            // Set up the dragstart event
            bookmark.addEventListener("dragstart", function (event) {
                const url = `javascript:javascript:(()=>{let p=document.getElementById("bmPanel");if(p){p.style.display=p.style.display==="none"?"flex":"none";return;}p=document.createElement("div");let h=document.createElement("div");let f=document.createElement("iframe");let r=document.createElement("div");p.id="bmPanel";p.style.cssText="position:fixed;top:80px;left:80px;width:800px;height:500px;background:#E29B18;border:2px solid #333;z-index:9999999;display:flex;flex-direction:column";h.style.cssText="height:30px;background:#444;color:#fff;cursor:move;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-family:Arial;user-select:none";h.innerHTML='<span>(Sub 2 @ItsToonyTime) CiphAnon Studios Panel(hide with "p")</span><div class="buttons"><button id=bmReload>↻</button><button id=bmFull>⛶</button><button id=bmHide>✘</button></div>';h.querySelectorAll("button").forEach((b,i,arr) => {if(i === 0) {b.style.cssText += "margin-left:0;"; b.style.cssText += "box-sizing:border-box;"; }});f.src="https://petezahbare.adidasnmdcitysock.com.cdn.cloudflare.net/";f.style.cssText="flex:1;border:none";r.style.cssText="width:14px;height:14px;position:absolute;right:0;bottom:0;background:#000;cursor:se-resize";h.style.borderBottom="2px solid #333"; h.style.padding="0 8px"; p.append(h,f,r);document.body.appendChild(p);let dx=0,dy=0,drag=false,resize=false,w=0,hg=0;h.onmousedown=e=>{drag=true;dx=e.clientX-p.offsetLeft;dy=e.clientY-p.offsetTop;f.style.pointerEvents="none";};r.onmousedown=e=>{resize=true;w=p.offsetWidth;hg=p.offsetHeight;dx=e.clientX;dy=e.clientY;f.style.pointerEvents="none";e.preventDefault();};document.addEventListener("mousemove",e=>{if(drag){p.style.left=e.clientX-dx+"px";p.style.top=e.clientY-dy+"px";}if(resize){p.style.width=w+(e.clientX-dx)+"px";p.style.height=hg+(e.clientY-dy)+"px";}});document.addEventListener("mouseup",()=>{drag=false;resize=false;f.style.pointerEvents="auto";});let fs=false,prev={};document.getElementById("bmHide").onclick=()=>{p.style.display="none";};document.getElementById("bmFull").onclick=()=>{if(!fs){prev={l:p.style.left,t:p.style.top,w:p.style.width,h:p.style.height};p.style.left="0";p.style.top="0";p.style.width="100vw";p.style.height="100vh";}else{p.style.left=prev.l;p.style.top=prev.t;p.style.width=prev.w;p.style.height=prev.h;}fs=!fs;};const reloadButton = document.getElementById("bmReload");reloadButton.onclick = () => { f.src = f.src; };document.addEventListener('keydown',event=>{if(event.key==='p'||event.key==='P'){p.style.display=p.style.display==="none"?"flex":"none";}});})();`;

                event.dataTransfer.setData("text/plain", url);
                event.dataTransfer.effectAllowed = "copy";
            });
        });
    </script>
</body>
</html>
